<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonetics Mastery App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        h2 {
            color: #333;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .next-btn {
            display: none;
            margin-top: 20px;
            background-color: #28a745;
        }
        button:hover {
            background-color: #0056b3;
        }
        #feedback {
            margin-top: 20px;
            font-weight: bold;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2 id="question-text">Loading question...</h2>
    <div class="options" id="options-container">
        </div>
    <div id="feedback"></div>
    <button id="next-btn" class="next-btn" onclick="loadNextQuestion()">Next Question</button>
</div>

<script>
    // This is our data structure. We can add hundreds of questions here!
    const quizData = [
        {
            question: "How many consonant and vowel sounds are there in English?",
            options: ["20 consonants, 24 vowels", "24 consonants, 20 vowels", "26 consonants, 18 vowels"],
            correctAnswer: "24 consonants, 20 vowels"
        },
        {
            question: "Which of the following describes the parts of a syllable?",
            options: ["Start, Middle, End", "Onset, Peak, Coda", "Prefix, Stem, Suffix"],
            correctAnswer: "Onset, Peak, Coda"
        },
        {
            question: "How many short vowels (SV) are there in English?",
            options: ["4", "5", "6"],
            correctAnswer: "6"
        }
    ];

    let currentQuestionIndex = 0;

    function loadQuestion() {
        const currentData = quizData[currentQuestionIndex];
        document.getElementById('question-text').innerText = currentData.question;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = ''; // Clear previous options
        document.getElementById('feedback').innerText = ''; // Clear feedback
        document.getElementById('next-btn').style.display = 'none'; // Hide next button

        // Generate buttons for each option
        currentData.options.forEach(option => {
            const button = document.createElement('button');
            button.innerText = option;
            button.onclick = () => checkAnswer(option, button);
            optionsContainer.appendChild(button);
        });
    }

    function checkAnswer(selectedOption, buttonElement) {
        const currentData = quizData[currentQuestionIndex];
        const feedbackElement = document.getElementById('feedback');

        if (selectedOption === currentData.correctAnswer) {
            feedbackElement.innerText = "Correct! Great job.";
            feedbackElement.style.color = "green";
            buttonElement.style.backgroundColor = "green";
        } else {
            feedbackElement.innerText = "Incorrect. The right answer is: " + currentData.correctAnswer;
            feedbackElement.style.color = "red";
            buttonElement.style.backgroundColor = "red";
        }

        // Disable all buttons after a guess
        const allButtons = document.getElementById('options-container').querySelectorAll('button');
        allButtons.forEach(btn => btn.disabled = true);

        // Show the "Next" button
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function loadNextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById('question-text').innerText = "Quiz Complete!";
            document.getElementById('options-container').innerHTML = '';
            document.getElementById('feedback').innerText = "You've finished this study session.";
            document.getElementById('next-btn').style.display = 'none';
        }
    }

    // Initialize the first question when the page loads
    loadQuestion();
</script>

</body>
</html>
